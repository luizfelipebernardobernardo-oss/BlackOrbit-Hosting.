<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Panel - BlackOrbit</title>
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Service Panel</div>
    <div class="nav-links">
      <a class="btn btn-secondary" href="/manage-services">Manage Services</a>
      <a class="btn btn-primary" href="/logout">Logout</a>
    </div>
  </header>

  <main class="dashboard">
    <div id="messageBox"></div>

    <div class="dashboard-top">
      <div>
        <h1 id="serviceTitle">Service</h1>
        <p id="serviceMeta">Loading...</p>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="dashboard-card">
        <h3>Status</h3>
        <div id="serviceStatus" class="badge-offline">Offline</div>
      </div>

      <div class="dashboard-card">
        <h3>CPU Usage</h3>
        <div id="serviceCpu" class="metric">0%</div>
      </div>

      <div class="dashboard-card">
        <h3>Memory Usage</h3>
        <div id="serviceMemory" class="metric">0.0 GB</div>
      </div>

      <div class="dashboard-card big-card">
        <h3>Actions</h3>
        <div class="quick-actions" id="serviceActions"></div>
      </div>

      <div class="dashboard-card big-card">
        <h3>Live Logs</h3>
        <div id="logsList" class="logs-list"></div>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const serviceId = params.get("id");
    const success = params.get("success");
    const box = document.getElementById("messageBox");

    if (success === "action_done") {
      box.innerHTML = `<div class="alert alert-success">Service action completed successfully.</div>`;
    }

    fetch(`/api/service?id=${serviceId}`)
      .then((res) => {
        if (!res.ok) {
          window.location.href = "/manage-services?error=service_not_found";
          return;
        }
        return res.json();
      })
      .then((data) => {
        const service = data.service;
        const logs = data.logs || [];

        document.getElementById("serviceTitle").textContent = service.name;
        document.getElementById("serviceMeta").textContent = `${service.runtime} • ${service.region}`;

        document.getElementById("serviceStatus").textContent = service.status;
        document.getElementById("serviceStatus").className =
          service.status === "Online" ? "badge-online" : "badge-offline";

        const cpu = service.status === "Online" ? "8%" : "0%";
        const memory = service.status === "Online" ? "0.4 GB" : "0.0 GB";

        document.getElementById("serviceCpu").textContent = cpu;
        document.getElementById("serviceMemory").textContent = memory;

        document.getElementById("serviceActions").innerHTML = `
          <form action="/service-action" method="POST">
            <input type="hidden" name="serviceId" value="${service.id}" />
            <input type="hidden" name="action" value="start" />
            <input type="hidden" name="returnTo" value="service" />
            <button type="submit" class="btn btn-primary">Start</button>
          </form>

          <form action="/service-action" method="POST">
            <input type="hidden" name="serviceId" value="${service.id}" />
            <input type="hidden" name="action" value="stop" />
            <input type="hidden" name="returnTo" value="service" />
            <button type="submit" class="btn btn-secondary">Stop</button>
          </form>

          <form action="/service-action" method="POST">
            <input type="hidden" name="serviceId" value="${service.id}" />
            <input type="hidden" name="action" value="restart" />
            <input type="hidden" name="returnTo" value="service" />
            <button type="submit" class="btn btn-secondary">Restart</button>
          </form>
        `;

        const logsList = document.getElementById("logsList");

        if (logs.length === 0) {
          logsList.innerHTML = `<div class="log-item"><code>No logs yet.</code></div>`;
        } else {
          logsList.innerHTML = logs
            .map(
              (log) => `
                <div class="log-item">
                  <strong>${new Date(log.created_at).toLocaleString()}</strong>
                  <code>${log.message}</code>
                </div>
              `
            )
            .join("");
        }
      });
  </script>
</body>
</html>
