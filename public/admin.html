<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - BlackOrbit</title>
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>
  <header class="navbar">
    <div class="logo">BlackOrbit Admin</div>
    <div class="nav-links">
      <a class="btn btn-secondary" href="/dashboard">Dashboard</a>
      <a class="btn btn-secondary" href="/billing">Billing</a>
      <a class="btn btn-primary" href="/logout">Logout</a>
    </div>
  </header>

  <main class="dashboard">
    <div id="messageBox"></div>

    <div class="dashboard-top">
      <div>
        <h1>Admin Panel</h1>
        <p>Manage users, plans, services, invoices, and tickets.</p>
      </div>
    </div>

    <div class="dashboard-card">
      <h3>User Management</h3>

      <div class="table-wrap">
        <table class="billing-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Plan</th>
              <th>Services</th>
              <th>Invoices</th>
              <th>Tickets</th>
              <th>Payment</th>
              <th>Change Plan</th>
              <th>Delete User</th>
            </tr>
          </thead>
          <tbody id="adminUsersBody">
            <tr>
              <td colspan="9" class="empty-cell">Loading users...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const success = params.get("success");
    const error = params.get("error");
    const box = document.getElementById("messageBox");

    const successMessages = {
      user_deleted: "User deleted successfully.",
      plan_changed: "User plan changed successfully."
    };

    const errorMessages = {
      invalid_plan: "Invalid plan selected.",
      server_error: "Server error."
    };

    if (success && successMessages[success]) {
      box.innerHTML = `<div class="alert alert-success">${successMessages[success]}</div>`;
    }

    if (error && errorMessages[error]) {
      box.innerHTML = `<div class="alert alert-error">${errorMessages[error]}</div>`;
    }

    fetch("/api/admin/users")
      .then((res) => res.json())
      .then((users) => {
        const tbody = document.getElementById("adminUsersBody");

        if (!users || users.length === 0) {
          tbody.innerHTML = `<tr><td colspan="9" class="empty-cell">No users found.</td></tr>`;
          return;
        }

        tbody.innerHTML = users.map((user) => `
          <tr>
            <td>${user.username}</td>
            <td>${user.email}</td>
            <td>${user.activePlan}</td>
            <td>${user.servicesCount}</td>
            <td>${user.invoicesCount}</td>
            <td>${user.ticketsCount}</td>
            <td>${user.paymentMethod}</td>
            <td>
              <form action="/admin/change-plan" method="POST" class="admin-inline-form">
                <input type="hidden" name="userId" value="${user.id}" />
                <select name="planKey" class="admin-select">
                  <option value="starter">Starter</option>
                  <option value="growth">Growth</option>
                  <option value="pro">Pro</option>
                </select>
                <button type="submit" class="btn btn-secondary admin-btn-small">Save</button>
              </form>
            </td>
            <td>
              <form action="/admin/delete-user" method="POST">
                <input type="hidden" name="userId" value="${user.id}" />
                <button type="submit" class="btn btn-secondary admin-btn-small">Delete</button>
              </form>
            </td>
          </tr>
        `).join("");
      });
  </script>
</body>
</html>
