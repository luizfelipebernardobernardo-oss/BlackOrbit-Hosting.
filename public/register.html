<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - BlackOrbit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p>Register to start using your hosting dashboard.</p>

      <div id="messageBox"></div>

      <form action="/register" method="POST">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Choose a username" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Create a password" required />
        </div>

        <button type="submit" class="btn btn-primary full-btn">Register</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Login</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    const box = document.getElementById("messageBox");

    const errorMessages = {
      empty_fields: "Please fill in all fields.",
      email_exists: "This email is already registered."
    };

    if (error && errorMessages[error]) {
      box.innerHTML = `<div class="alert alert-error">${errorMessages[error]}</div>`;
    }
  </script>
</body>
</html>
